<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tüm Projeler — Oskar Duş</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .projects-page-header {
      padding: 8rem 3rem 3rem;
      text-align: center;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .projects-page-header .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2rem;
      transition: all 0.3s;
    }
    .projects-page-header .back-link:hover { opacity: 0.7; gap: 0.8rem; }
    .projects-page-header .back-link:hover svg { transform: translateX(-3px); }
    .projects-page-header .back-link svg { width: 16px; height: 16px; transition: transform 0.3s; }
    .projects-page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
    }
    .projects-page-header h1 em { font-style: italic; color: var(--gold); }
    .projects-page-header p { color: var(--text-secondary); margin-top: 0.8rem; font-weight: 300; }
    .projects-page-header .divider { width: 60px; height: 1px; background: var(--gold); margin: 1.5rem auto 0; }

    .projects-page-content { padding: 3rem; max-width: 1200px; margin: 0 auto; }
    .projects-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .projects-full-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .projects-full-grid .gallery-item { aspect-ratio: 4/3; }

    .projects-empty { text-align: center; padding: 4rem 2rem; grid-column: 1 / -1; }
    .projects-empty svg { width: 48px; height: 48px; opacity: 0.2; margin-bottom: 1rem; }
    .projects-empty p { color: var(--text-muted); }

    .photo-count {
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-light);
      color: var(--gold);
      font-size: 0.68rem;
      letter-spacing: 1px;
      padding: 0.25rem 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      z-index: 2;
    }
    .photo-count svg { width: 12px; height: 12px; }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.active { display: flex; }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      z-index: 10001;
      transition: color 0.3s;
      line-height: 1;
    }
    .lightbox-close:hover { color: var(--gold); }

    .lightbox-title {
      position: absolute;
      top: 1.8rem;
      left: 2rem;
      font-family: var(--font-display);
      font-size: 1.5rem;       /* eski: 1.1rem */
      color: #fff;
      z-index: 10001;
    }

    .lightbox-main {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 5rem 4rem 7rem;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 1px solid rgba(255,255,255,0.08);
      animation: lbFadeIn 0.3s ease;
    }

    @keyframes lbFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .lightbox-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10001;
    }
    .lightbox-arrow:hover {
      background: var(--gold);
      color: var(--bg-primary);
      border-color: var(--gold);
    }
    .lightbox-arrow svg { width: 20px; height: 20px; }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    .lightbox-counter {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 2px;
      z-index: 10001;
    }

    .lightbox-thumbs {
      position: absolute;
      bottom: 3.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10001;
    }

    .lightbox-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.3s;
    }
    .lightbox-thumb:hover { opacity: 0.7; }
    .lightbox-thumb.active { border-color: var(--gold); opacity: 1; }

    .lightbox-arrow.hidden { display: none; }
    .lightbox-thumbs.hidden { display: none; }

    .footer { padding: 2rem 3rem; border-top: 1px solid var(--border); margin-top: 4rem; }

    @media (max-width: 1024px) {
      .projects-full-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .nav { padding: 0.8rem 1.5rem; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .projects-page-header { padding: 6rem 1.5rem 2rem; }
      .projects-page-content { padding: 2rem 1.5rem; }
      .projects-full-grid { grid-template-columns: 1fr; }
      .lightbox-main { padding: 4rem 1rem 6rem; }
      .lightbox-arrow { width: 36px; height: 36px; }
      .lightbox-prev { left: 0.5rem; }
      .lightbox-next { right: 0.5rem; }
      .lightbox-thumb { width: 36px; height: 36px; }
      .lightbox-title { font-size: 0.9rem; left: 1rem; top: 1.2rem; }
      .lightbox-close { top: 1rem; right: 1rem; }
    }
  </style>
</head>
<body>

  <!-- NAVİGASYON -->
  <nav class="nav scrolled" id="nav">
    <a href="index.html" class="nav-logo">Oskar<span>Duş</span></a>
    <ul class="nav-links">
      <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
      <li><a href="index.html#projeler">Projeler</a></li>
      <li><a href="index.html#urunler">Ürünler</a></li>
      <li><a href="index.html#firmalar">Firmalar</a></li>
      <li><a href="index.html#iletisim" class="nav-cta">Teklif Al</a></li>
    </ul>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menüyü aç">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobil Menü -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-close" id="mobileCloseBtn" aria-label="Menüyü kapat">&times;</button>
    <a href="index.html#hakkimizda" class="mobile-link">Hakkımızda</a>
    <a href="index.html#projeler" class="mobile-link">Projeler</a>
    <a href="index.html#urunler" class="mobile-link">Ürünler</a>
    <a href="index.html#firmalar" class="mobile-link">Firmalar</a>
    <a href="index.html#iletisim" class="mobile-link">İletişim</a>
  </div>

  <!-- SAYFA BAŞLIĞI -->
  <div class="projects-page-header">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Ana Sayfaya Dön
    </a>
    <h1>Tüm <em>Projelerimiz</em></h1>
    <p>Tamamladığımız tüm çalışmalar</p>
    <div class="divider"></div>
  </div>

  <!-- PROJELER -->
  <div class="projects-page-content">
    <div class="projects-count" id="projectsCount"></div>
    <div class="projects-full-grid" id="allProjectsGrid"></div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">&times;</button>
    <span class="lightbox-title" id="lbTitle"></span>
    <div class="lightbox-main" id="lbMain">
      <button class="lightbox-arrow lightbox-prev" id="lbPrev">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 19l-7-7 7-7"/></svg>
      </button>
      <img class="lightbox-img" id="lbImg" src="" alt="">
      <button class="lightbox-arrow lightbox-next" id="lbNext">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="lightbox-thumbs" id="lbThumbs"></div>
    <div class="lightbox-counter" id="lbCounter"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-bottom" style="max-width:1200px;margin:0 auto;">
      <span>&copy; 2026 Oskar Duş. Tüm hakları saklıdır.</span>
    </div>
  </footer>

  <script src="projeler.js"></script>
</body>
</html>
