<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tüm Projeler — Oskar Duş</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .projects-page-header {
      padding: 8rem 3rem 3rem;
      text-align: center;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .projects-page-header .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2rem;
      transition: opacity 0.3s;
    }
    .projects-page-header .back-link:hover { opacity: 0.7; }
    .projects-page-header .back-link svg { width: 16px; height: 16px; }
    .projects-page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
    }
    .projects-page-header h1 em {
      font-style: italic;
      color: var(--gold);
    }
    .projects-page-header p {
      color: var(--text-secondary);
      margin-top: 0.8rem;
      font-weight: 300;
    }
    .projects-page-header .divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 1.5rem auto 0;
    }
    .projects-page-content {
      padding: 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .projects-count {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .projects-full-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .projects-full-grid .gallery-item {
      aspect-ratio: 4/3;
    }
    .projects-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .projects-empty svg {
      width: 48px;
      height: 48px;
      opacity: 0.2;
      margin-bottom: 1rem;
    }
    @media (max-width: 768px) {
      .projects-page-header { padding: 6rem 1.5rem 2rem; }
      .projects-page-content { padding: 2rem 1.5rem; }
      .projects-full-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAVİGASYON -->
  <nav class="nav scrolled" id="nav">
    <a href="index.html" class="nav-logo">Oskar<span>Duş</span></a>
    <ul class="nav-links">
      <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
      <li><a href="index.html#projeler">Projeler</a></li>
      <li><a href="index.html#urunler">Ürünler</a></li>
      <li><a href="index.html#firmalar">Firmalar</a></li>
      <li><a href="index.html#iletisim" class="nav-cta">Teklif Al</a></li>
    </ul>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menüyü aç">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobil Menü -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-close" id="mobileCloseBtn" aria-label="Menüyü kapat">&times;</button>
    <a href="index.html#hakkimizda" class="mobile-link">Hakkımızda</a>
    <a href="index.html#projeler" class="mobile-link">Projeler</a>
    <a href="index.html#urunler" class="mobile-link">Ürünler</a>
    <a href="index.html#firmalar" class="mobile-link">Firmalar</a>
    <a href="index.html#iletisim" class="mobile-link">İletişim</a>
  </div>

  <!-- SAYFA BAŞLIĞI -->
  <div class="projects-page-header">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Ana Sayfaya Dön
    </a>
    <h1>Tüm <em>Projelerimiz</em></h1>
    <p>Tamamladığımız tüm çalışmalar</p>
    <div class="divider"></div>
  </div>

  <!-- PROJELER -->
  <div class="projects-page-content">
    <div class="projects-count" id="projectsCount"></div>
    <div class="projects-full-grid" id="allProjectsGrid"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-bottom" style="max-width:1200px;margin:0 auto;">
      <span>&copy; 2026 Oskar Duş. Tüm hakları saklıdır.</span>
    </div>
  </footer>

  <script>
    // Projeleri yükle
    document.addEventListener('DOMContentLoaded', () => {
      const projects = JSON.parse(localStorage.getItem('cc_projects') || '[]');
      const grid = document.getElementById('allProjectsGrid');
      const countEl = document.getElementById('projectsCount');

      if (projects.length === 0) {
        grid.innerHTML = `
          <div class="projects-empty" style="grid-column: 1 / -1;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M9 21V9"/>
            </svg>
            <p>Henüz proje eklenmemiş.</p>
          </div>
        `;
        return;
      }

      countEl.textContent = `Toplam ${projects.length} proje`;

      projects.forEach(project => {
        const card = document.createElement('div');
        card.className = 'gallery-item';

        const imgDiv = document.createElement('div');
        imgDiv.className = 'gallery-item-img';

        if (project.image) {
          imgDiv.style.backgroundImage = `url('${project.image}')`;
          imgDiv.style.backgroundSize = 'cover';
          imgDiv.style.backgroundPosition = 'center';
        } else {
          imgDiv.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M9 21V9"/>
            </svg>
          `;
        }

        const overlay = document.createElement('div');
        overlay.className = 'gallery-overlay';
        overlay.innerHTML = `
          <h4>${project.title || ''}</h4>
          <p>${project.description || ''}</p>
          ${project.tag ? `<span class="gallery-tag">${project.tag}</span>` : ''}
          ${project.details ? `<span class="gallery-tag">${project.details}</span>` : ''}
        `;

        card.appendChild(imgDiv);
        card.appendChild(overlay);
        grid.appendChild(card);
      });

      // Mobil menü
      document.getElementById('hamburgerBtn').addEventListener('click', () => {
        document.getElementById('mobileMenu').classList.add('active');
        document.body.style.overflow = 'hidden';
      });
      document.getElementById('mobileCloseBtn').addEventListener('click', () => {
        document.getElementById('mobileMenu').classList.remove('active');
        document.body.style.overflow = '';
      });
    });
  </script>

</body>
</html>
